default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5433") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "bluetile") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "bluetile") %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: bluetile_development

test:
  <<: *default
  database: bluetile_test

production:
  primary: &primary_production
    <<: *default
    database: bluetile_production
    password: <%= ENV["BLUETILE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: bluetile_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: bluetile_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: bluetile_production_cable
    migrations_paths: db/cable_migrate
